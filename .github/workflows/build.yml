name: Build FeatherX Browser

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Decode release keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "ERROR: KEYSTORE_BASE64 secret is not set. Generate a keystore once locally and store it (along with KEYSTORE_PASSWORD, KEY_ALIAS, KEY_PASSWORD) as GitHub Actions secrets." >&2
            exit 1
          fi
          echo "$KEYSTORE_BASE64" | base64 -d > app/release-key.keystore

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build Release APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease --stacktrace --no-daemon 2>&1

      - name: Upload APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: FeatherX-Browser-v1.0.${{ github.run_number }}
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: warn
