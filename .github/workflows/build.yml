name: Build FeatherX Browser APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Generate release keystore
        run: |
          keytool -genkeypair -v \
            -keystore app/release-key.keystore \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -alias featherx \
            -storepass android \
            -keypass android \
            -dname "CN=FeatherX, OU=Dev, O=FeatherX, L=Unknown, ST=Unknown, C=US"

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: FeatherX-Browser-release
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30

      - name: APK info
        run: |
          ls -lh app/build/outputs/apk/release/
          echo "Build complete ✓"
