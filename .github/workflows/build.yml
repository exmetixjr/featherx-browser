name: Build FeatherX Browser

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Generate release keystore
        run: |
          cd app
          echo -e "android\nandroid\nandroid\n\n\n\n\nyes" | keytool -genkeypair -v \
            -keystore release-key.keystore \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -alias featherx \
            -dname "CN=FeatherX, OU=Dev, O=FeatherX, L=Unknown, ST=Unknown, C=US"
          cd ..

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build Release APK
        run: ./gradlew assembleRelease --stacktrace --no-daemon 2>&1

      - name: Upload APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: FeatherX-Browser-v1.0.${{ github.run_number }}
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: warn
