name: Build FeatherX Browser APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Generate release keystore
        run: |
          keytool -genkeypair -v \
            -keystore app/release-key.keystore \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -alias featherx \
            -storepass android \
            -keypass android \
            -dname "CN=FeatherX, OU=Dev, O=FeatherX, L=Unknown, ST=Unknown, C=US"

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon

      - name: Get version info
        id: version
        run: |
          VERSION=$(grep "versionName" app/build.gradle | awk '{print $2}' | tr -d '"')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION-$(date +'%Y%m%d-%H%M%S')" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: FeatherX Browser ${{ steps.version.outputs.version }}
          body: |
            Automated release from commit ${{ github.sha }}
            
            ### Changes
            See [commit history](https://github.com/${{ github.repository }}/commits/main)
          files: app/build/outputs/apk/release/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: APK info
        run: |
          ls -lh app/build/outputs/apk/release/
          echo "Build complete ✓"
